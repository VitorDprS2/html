<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitor</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        background:linear-gradient(135deg,#4facfe,#00f2fe);
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        height:100vh;
        font-family:Arial, Helvetica, sans-serif;
    }

    h1{
        color:white;
        margin-bottom:30px;
        font-size:48px;
        text-shadow:2px 2px 5px rgba(0,0,0,.3);
    }

    .face{
        width:220px;
        height:220px;
        background:#FFD54F;
        border-radius:50%;
        position:relative;
        box-shadow:0 10px 25px rgba(0,0,0,.25);
    }

    .eye{
        width:55px;
        height:55px;
        background:white;
        border-radius:50%;
        position:absolute;
        top:60px;
        overflow:hidden;
        border:3px solid #333;
    }

    .left{
        left:45px;
    }

    .right{
        right:45px;
    }

    .pupil{
        width:20px;
        height:20px;
        background:#222;
        border-radius:50%;
        position:absolute;
        top:17px;
        left:17px;
        transition:.03s;
    }

    .mouth{
        width:90px;
        height:45px;
        border:5px solid #333;
        border-top:none;
        border-left:none;
        border-right:none;
        border-radius:0 0 100px 100px;
        position:absolute;
        bottom:45px;
        left:50%;
        transform:translateX(-50%);
    }
</style>

</head>
<body>

<h1>Vitor</h1>

<div class="face">
    <div class="eye left">
        <div class="pupil"></div>
    </div>

    <div class="eye right">
        <div class="pupil"></div>
    </div>

    <div class="mouth"></div>
</div>

<script>
const eyes = document.querySelectorAll(".eye");

document.addEventListener("mousemove", (e) => {

    eyes.forEach(eye => {

        const pupil = eye.querySelector(".pupil");

        const rect = eye.getBoundingClientRect();

        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;

        const angle = Math.atan2(
            e.clientY - centerY,
            e.clientX - centerX
        );

        const radius = 12;

        const x = Math.cos(angle) * radius;
        const y = Math.sin(angle) * radius;

        pupil.style.transform = `translate(${x}px, ${y}px)`;
    });

});
</script>

</body>
</html>
